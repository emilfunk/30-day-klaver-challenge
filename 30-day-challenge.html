// --- COMPONENTS ---

// 1. Piano Keyboard SVG Component
const Keyboard = ({ id }) => {
  const [activeKeys, setActiveKeys] = useState({});

  const toggleKey = (keyIndex) => {
    setActiveKeys(prev => ({ ...prev, [keyIndex]: !prev[keyIndex] }));
  };

  const whiteKeys = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16, 17, 19, 21, 23];
  const blackKeys = [1, 3, null, 6, 8, 10, null, 13, 15, null, 18, 20, 22];

  return (
    <div className="flex justify-center my-4 print:my-2">
      <svg width="280" height="80" viewBox="0 0 280 80" className="border border-slate-800 rounded-sm shadow-sm print:shadow-none print:w-[260px] print:h-[74px]">
        {/* White Keys */}
        {whiteKeys.map((k, i) => (
          <rect
            key={`w-${k}`}
            x={i * 20} y="0" width="20" height="80"
            fill={activeKeys[k] ? '#93c5fd' : 'white'}
            stroke="#1e293b" strokeWidth="1"
            onClick={() => toggleKey(k)}
            className="cursor-pointer hover:fill-blue-50 transition-colors"
          />
        ))}
        {/* Black Keys */}
        {blackKeys.map((k, i) => {
          if (k === null) return null;
          return (
            <rect
              key={`b-${k}`}
              x={(i * 20) + 14} y="0" width="12" height="45"
              fill={activeKeys[k] ? '#3b82f6' : '#1e293b'}
              stroke="#0f172a" strokeWidth="1"
              onClick={() => toggleKey(k)}
              className="cursor-pointer hover:fill-slate-700 transition-colors"
            />
          );
        })}
      </svg>
    </div>
  );
};

// 2. Music Staff SVG Component
const Staff = ({ clef, notePos, grandStaff }) => {
  const lines = [10, 20, 30, 40, 50];
  const showLedger = notePos && (notePos > 50 || notePos < 10);
  const clefSymbol = clef === 'bass' ? '𝄢' : clef === 'treble' ? '𝄞' : null;
  
  return (
    <div className="w-full my-4 flex flex-col items-center">
      <svg width="100%" height={grandStaff ? "140" : "60"} className="max-w-md print:max-w-full">
        {/* Treble/Single Staff */}
        {lines.map(y => (
          <line key={`l1-${y}`} x1="0" y1={y} x2="100%" y2={y} stroke="#333" strokeWidth="1" />
        ))}
        {clefSymbol && !grandStaff && (
          <text x="8" y={clef === 'bass' ? "34" : "46"} fontSize={clef === 'bass' ? "28" : "38"} fontFamily="serif" fill="#111827">{clefSymbol}</text>
        )}
        {grandStaff && lines.map(y => (
          <line key={`l2-${y}`} x1="0" y1={y + 80} x2="100%" y2={y + 80} stroke="#333" strokeWidth="1" />
        ))}
        
        {/* Connecting Bar for Grand Staff */}
        {grandStaff && (
          <>
            <line x1="1" y1="10" x2="1" y2="130" stroke="#333" strokeWidth="2" />
            <path d="M 10 10 C -5 30, -5 110, 10 130" fill="none" stroke="#333" strokeWidth="2" />
          </>
        )}

        {/* Note head if notePos is provided */}
        {showLedger && <line x1="47%" y1={notePos} x2="53%" y2={notePos} stroke="#333" strokeWidth="1" />}
        {notePos && (
          <circle cx="50%" cy={notePos} r="4.5" fill="#1e293b" />
        )}
      </svg>
    </div>
  );
};

// 3. Exercise Renderer Component
const Exercise = ({ data, number }) => {
  const inferredClef = data.clef || (data.text.includes('F-nøgle') ? 'bass' : data.text.includes('G-nøgle') ? 'treble' : undefined);

  return (
    <div className="exercise-block mb-6 print:mb-3">
      <p className="exercise-text text-slate-800 font-medium mb-2 print:text-[12px] leading-snug">{data.text}</p>
      
      {data.type === 'quiz' && (
        <div className="flex flex-wrap gap-4 mt-2">
          {data.options.map((opt, i) => (
            <label key={i} className="flex items-center gap-2 cursor-pointer print:text-sm">
              <input type="radio" name={data.id} className="w-4 h-4 text-blue-600 border-slate-300 focus:ring-blue-500 print:border-black" />
              <span>{opt}</span>
            </label>
          ))}
        </div>
      )}

      {data.type === 'math' && (
        <div className="flex items-center gap-2 mt-2">
          <span className="text-slate-600 print:text-sm">Svar:</span>
          <input type="text" className="border-b-2 border-slate-300 w-16 px-2 py-1 text-center focus:outline-none focus:border-blue-500 print:border-black bg-transparent" />
        </div>
      )}

      {data.type === 'keyboard' && <Keyboard id={data.id} />}

      {data.type === 'drawing' && (
        <div className="mt-2 border-2 border-dashed border-slate-200 rounded-lg p-4 print:border-slate-400 bg-slate-50 print:bg-white min-h-[80px]">
           {data.staff ? <Staff clef={inferredClef} /> : data.grandStaff ? <Staff grandStaff /> : <span className="text-slate-400 italic text-sm print:hidden">Tegn dit svar her (udskriv siden først)</span>}
        </div>
      )}

      {data.type === 'note-naming' && (
        <div className="mt-2">
          <Staff notePos={data.notePos} clef={inferredClef} />
          <div className="flex justify-center gap-2 mt-2">
            <span className="text-slate-600 print:text-sm">Nodenavn:</span>
            <input type="text" maxLength={2} className="border-b-2 border-slate-300 w-12 px-2 py-1 text-center font-bold uppercase focus:outline-none focus:border-blue-500 print:border-black bg-transparent" />
          </div>
        </div>
      )}
    </div>
  );
};
